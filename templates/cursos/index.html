{% extends "layout.html" %}
{% block container %}

<div class="py-32 relative overflow-x-auto sm:rounded-lg">
  <a
    href="{{ url_for('cursos.cursos_nuevo') }}"
    class="mb-4 inline-flex items-center gap-2 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600"
  >
    Nuevo
  </a>

  <table class="w-full text-sm text-left text-gray-700 bg-white shadow-md rounded-lg overflow-hidden">
    <thead class="text-xs text-gray-700 uppercase bg-gray-100 border-b border-gray-300">
      <tr>
        <th scope="col" class="px-6 py-3">ID</th>
        <th scope="col" class="px-6 py-3">Nombre</th>
        <th scope="col" class="px-6 py-3">Descripción</th>
        <th scope="col" class="px-6 py-3">Maestro</th>
        <th scope="col" class="px-6 py-3">Editar</th>
        <th scope="col" class="px-6 py-3">Detalles</th>
        <th scope="col" class="px-6 py-3">Eliminar</th>
      </tr>
    </thead>
    <tbody>
      {% for curso in cursos %}
      <tr class="bg-white border-b border-gray-200 hover:bg-gray-50">
        <td class="px-6 py-4 text-gray-800">{{ curso.id }}</td>
        <td class="px-6 py-4 text-gray-800">{{ curso.nombre }}</td>
        <td class="px-6 py-4 text-gray-800">{{ curso.descripcion }}</td>
        <td class="px-6 py-4 text-gray-800">{{ curso.maestro.nombre }}</td>
        <td class="px-6 py-4">
          <a
            href="{{ url_for('cursos.cursos_modificar', id=curso.id) }}"
            class="inline-flex items-center gap-2 bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600"
          >
            Editar
          </a>
        </td>
        <td class="px-6 py-4">
          <a
            href="{{ url_for('cursos.cursos_detalles', id=curso.id) }}"
            class="inline-flex items-center gap-2 bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600"
          >
            Detalles
          </a>
        </td>
        <td class="px-6 py-4">
          <a
            href="{{ url_for('cursos.cursos_eliminar', id=curso.id) }}"
            class="inline-flex items-center gap-2 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600"
          >
            Eliminar
          </a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
